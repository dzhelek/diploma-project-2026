; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ESP-32]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = git@github.com:rweather/TinyJAMBU.git#83ccf8e0e59d32347915a864bc441d7c900402c7
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM6
upload_port = COM6
;configure specific define for ESP-32
build_flags = -D SLAVE_ESP32

[env:ESP-12]
board = nodemcuv2
framework = arduino
platform = espressif8266
lib_deps = git@github.com:rweather/TinyJAMBU.git#83ccf8e0e59d32347915a864bc441d7c900402c7
monitor_speed = 9600
build_flags = -D SLAVE_ESP_12

[env:Raspberry]
;platform = raspberrypi
;board = pico
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
lib_deps = git@github.com:rweather/TinyJAMBU.git#83ccf8e0e59d32347915a864bc441d7c900402c7
monitor_speed = 115200
upload_protocol = picotool
board_upload.wait_for_upload_port = false
build_flags = -D SLAVE_RASPBERRY_PI_PICO

[env:Arduino]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps = git@github.com:rweather/TinyJAMBU.git#83ccf8e0e59d32347915a864bc441d7c900402c7
monitor_speed = 9600
build_flags = -D SLAVE_ARDUINO_NANO